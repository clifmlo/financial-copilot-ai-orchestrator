name: Build and Deploy AI Orchestrator

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ai-orchestrator

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push container image
        run: |
          IMAGE="${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ vars.ACR_NAME }}
          containerAppName: ${{ vars.ACA_ORCHESTRATOR_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ env.IMAGE }}
          environmentVariables: >
            PORTFOLIO_API_URL=${{ vars.PORTFOLIO_API_URL }}
            LLM_PROVIDER=azure_openai
            AZURE_OPENAI_ENDPOINT=${{ vars.AZURE_OPENAI_ENDPOINT }}
            AZURE_OPENAI_API_VERSION=${{ vars.AZURE_OPENAI_API_VERSION }}
            AZURE_OPENAI_DEPLOYMENT=${{ vars.AZURE_OPENAI_DEPLOYMENT }}
            AZURE_OPENAI_API_KEY=secretref:azure-openai-api-key
            CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
          secrets: |
            azure-openai-api-key=${{ secrets.AZURE_OPENAI_API_KEY }}
